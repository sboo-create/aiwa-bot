name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: pip install -r stats/requirements.txt
      - run: python -m py_compile aiwa_bot.py llm.py analytics_v2.py cycle.py image.py report.py stats/server.py scripts/migrate_legacy_analytics.py
      - run: python -m unittest discover -s tests -v
      - run: pip install pip-audit bandit
      - run: pip-audit -r requirements.txt
      - run: pip-audit -r stats/requirements.txt
      - run: bandit -q -r aiwa_bot.py llm.py analytics_v2.py cycle.py image.py report.py stats/server.py scripts/migrate_legacy_analytics.py -ll
