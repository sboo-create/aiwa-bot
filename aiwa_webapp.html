.prow{display:flex;gap:8px;margin:0 0 14px}
.pbtn{flex:1;border:none;border-radius:14px;padding:12px;font-family:var(--sans);font-weight:600;font-size:13px;cursor:pointer;background:var(--roseDeep);color:#fff}

.pbtn:active{transform:scale(.97)}
.homebtn{display:block;width:100%;margin:18px 0 2px;padding:13px;border:1px solid var(--roseLine);background:var(--roseWash);color:var(--roseDeep);border-radius:16px;font-family:var(--sans);font-weight:600;font-size:13.5px;cursor:pointer}

.think{display:inline-flex;gap:4px;align-items:center;color:var(--roseDeep);font-size:13px;font-style:italic}
.think span{width:4px;height:4px;border-radius:50%;background:var(--rose);animation:dp 1s infinite}
.think span:nth-child(2){animation-delay:.16s}.think span:nth-child(3){animation-delay:.32s}
@keyframes dp{0%,100%{opacity:.3}50%{opacity:1}}
.hidden{display:none}
</style>
</head>

function cycleChart(hist){

  return "<svg viewBox='0 0 "+W+" "+H+"' style='width:100%;height:auto;display:block'>"+
    "<rect x='"+pad+"' y='"+bandTop.toFixed(1)+"' width='"+(W-2*pad)+"' height='"+Math.max(0,bandBot-bandTop).toFixed(1)+"' rx='6' fill='#EFEAE6'/>"+
    "<path d='"+path+"' fill='none' stroke='#C4BAB3' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/>"+dots+"</svg>";

function go(t){TABS.forEach(function(x){document.getElementById('scr-'+x[0]).classList.toggle('hidden',x[0]!==t);document.querySelector('.tab[data-t="'+x[0]+'"]').classList.toggle('on',x[0]===t);});document.getElementById('composer').classList.toggle('hidden',t!=='chat');if(t==='food')renderFood();if(t==='train')renderTrain();if(t==='stats')renderStats();if(t==='chat'){initChat();scrollBottom();}window.scrollTo(0,0);}
var tabsEl=document.getElementById('tabs');
TABS.forEach(function(x){var d=document.createElement('div');d.className='tab';d.setAttribute('data-t',x[0]);d.innerHTML=ICONS[x[0]]+"<span>"+x[1]+"</span>";d.onclick=function(){if(tg&&tg.HapticFeedback)tg.HapticFeedback.selectionChanged();go(x[0]);};tabsEl.appendChild(d);});
document.getElementById("dopClose").onclick=closeDayOp;
document.getElementById("dayop").onclick=function(ev){if(ev.target.id==="dayop")closeDayOp();};

document.getElementById("dopPA").onclick=function(){if(DAYOP_ISO){markPA(DAYOP_ISO);closeDayOp();}};
function showNeedOnboard(){
  document.getElementById('tabs').style.display='none';
  document.getElementById('composer').classList.add('hidden');
  var el=document.getElementById('app');
  el.innerHTML="<div style='display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:78vh;text-align:center;gap:18px;padding:24px'><span class='blossom' id='nl'></span><div class='h' style='margin:0'>Сначала настрой цикл</div><div style='font-size:14px;color:var(--inkMid);line-height:1.5;max-width:280px'>Открой чат с Айвой и отметь последние месячные. После этого приложение покажет твой цикл, питание и нагрузку.</div><button class='chip' style='font-size:14px;padding:11px 22px' onclick='if(window.Telegram&&window.Telegram.WebApp)window.Telegram.WebApp.close()'>Перейти в чат</button></div>";
  blossom(document.getElementById('nl'),56);
}
function addHome(){if(tg&&tg.HapticFeedback)tg.HapticFeedback.impactOccurred('light');if(tg&&tg.addToHomeScreen){tg.addToHomeScreen();}else if(tg&&tg.showAlert){tg.showAlert('Доступно в новых версиях Telegram: меню \u22EE \u2192 «На главный экран».');}}
function updateHomeBtn(){var b=document.getElementById('homebtn');if(!b)return;if(!(tg&&tg.isVersionAtLeast&&tg.isVersionAtLeast('8.0'))){b.style.display='none';return;}if(tg.checkHomeScreenStatus){tg.checkHomeScreenStatus(function(st){b.style.display=(st==='added'||st==='unsupported')?'none':'block';});}else{b.style.display='block';}}
function boot(){renderToday();go('today');}
if(INIT){api('/api/data',{name:NAME}).then(function(d){if(d&&d.onboarded){D=d;boot();}else{showNeedOnboard();}});}
else{D={onboarded:true,cycle:true,last_period:null,cycle_len:28,name:NAME};boot();}
</script>
</body>
</html>
