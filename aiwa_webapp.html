<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Айва</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#FAF5F2;--paper2:#F4ECE7;--ink:#211C1A;--inkMid:#6E635C;--inkSoft:#A89C93;
--rose:#E0879A;--roseDeep:#C25E76;--roseWash:#FBE4E9;--roseLine:#F2C9D3;--quince:#E5A734;--quinceWash:#FBEFCB;--quinceDeep:#C98A1E;
--sage:#94A97E;--sageWash:#E6EBDD;--line:rgba(33,28,26,0.08);--serif:'Cormorant Garamond',Georgia,serif;--sans:'Manrope',system-ui,sans-serif}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{overscroll-behavior:none}body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;overscroll-behavior:none}
#app{max-width:480px;margin:0 auto;min-height:calc(100vh - var(--safe-top,0px));padding:16px 16px calc(122px + env(safe-area-inset-bottom))}
.bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.brand{display:flex;align-items:center;gap:8px}.brand .nm{font-family:var(--serif);font-size:21px;font-weight:600}
.date{font-size:12px;color:var(--inkSoft)}
.eyebrow{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--inkSoft);font-weight:600}
.greet{font-family:var(--serif);font-size:30px;font-weight:500;line-height:1.1;margin:6px 0 16px}.greet .nm{color:var(--roseDeep)}
.h{font-family:var(--serif);font-size:26px;font-weight:500;margin:4px 0 14px}
.ayva{border-radius:20px;padding:16px;margin-bottom:16px;border:1px solid var(--roseLine);background:linear-gradient(120deg,var(--roseWash) 0%,var(--quinceWash) 125%)}
.ayva-top{display:flex;gap:11px;align-items:flex-start}
.ayva-lab{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--roseDeep);margin-bottom:5px}
.ayva-txt{font-size:13.5px;line-height:1.55;color:var(--ink);white-space:pre-wrap}
.medline{font-size:11.5px;line-height:1.45;color:var(--inkMid);margin-top:10px;padding-top:10px;border-top:1px solid rgba(194,94,118,.14)}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px}
.chip{font-size:11.5px;font-weight:500;padding:8px 13px;border-radius:999px;border:1px solid rgba(194,94,118,.18);background:rgba(255,255,255,.72);color:var(--roseDeep);cursor:pointer;text-align:left;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg.ai .chip{background:#fff;border-color:var(--roseLine);box-shadow:0 1px 0 rgba(33,28,26,.03)}
.chip:active{transform:scale(.96)}
.card{background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:14px}
.tag{display:inline-flex;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:5px 11px;border-radius:999px}
.pl{display:flex;align-items:center;gap:10px;margin-bottom:6px}.psub{font-size:13px;color:var(--inkMid)}
.pday{font-family:var(--serif);font-size:38px;font-weight:500;line-height:1;margin-top:6px}
.pmeta{font-size:12.5px;color:var(--inkSoft);margin-top:6px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--paper2);border-radius:16px;padding:13px 12px}
.stat .l{font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--inkSoft);font-weight:600}
.stat .v{font-family:var(--serif);font-size:23px;font-weight:500;margin-top:4px}.stat .s{font-size:10.5px;color:var(--inkSoft)}
.sec{font-family:var(--serif);font-size:18px;font-weight:500;margin:18px 0 10px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.calhead{display:flex;align-items:center;justify-content:space-between;margin:18px 0 10px}
.calnav{border:none;background:var(--paper2);color:var(--roseDeep);width:34px;height:34px;border-radius:11px;font-size:20px;line-height:1;cursor:pointer;font-family:var(--sans)}
.calnav:active{transform:scale(.94)}
.calhint{font-size:11px;color:var(--inkSoft);text-align:center;margin-top:8px;min-height:14px}
.wd{text-align:center;font-size:10px;color:var(--inkSoft);font-weight:600}
.day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:13px;border:2px solid transparent;background:transparent;font-family:var(--sans);padding:0;color:var(--ink)}
.day:not(.empty){cursor:pointer}.day:disabled{cursor:default;opacity:.45}
.day.empty{border:none}.day.today{background:#fff;color:var(--ink);font-weight:800;box-shadow:0 0 0 3px rgba(33,28,26,.10)}
.legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin:14px 0 0}
.lg{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--inkMid)}.dot{width:10px;height:10px;border-radius:50%}
.macros{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.mac{background:var(--paper2);border-radius:14px;padding:10px;text-align:center}
.mac .l{font-size:9.5px;text-transform:uppercase;color:var(--inkSoft);font-weight:600}.mac .v{font-family:var(--serif);font-size:20px;margin-top:2px}
.meal{display:flex;gap:11px;align-items:flex-start;padding:9px 0;border-top:1px solid var(--line)}
.meal .sw{width:34px;height:34px;border-radius:11px;flex-shrink:0}
.meal .tm{font-size:10px;color:var(--inkSoft);font-weight:600}.meal .ds{font-size:13.5px;font-weight:600}.meal .nt{font-size:11.5px;color:var(--inkSoft)}
.foot{font-size:11px;color:var(--inkSoft);text-align:center;margin-top:20px;line-height:1.5}
.blossom{position:relative;flex-shrink:0}
.petal{position:absolute;left:50%;top:50%;transform-origin:50% 86%;background:radial-gradient(115% 92% at 50% 16%,#FFFFFF 0%,#FBE4E9 28%,#F2B3A6 60%,#E2879B 100%);border-radius:50% 50% 46% 46% / 62% 62% 38% 38%;box-shadow:inset 0 -6px 12px rgba(194,94,118,.28),inset 0 3px 6px rgba(255,255,255,.6)}
.core{position:absolute;left:50%;top:50%;border-radius:50%;background:radial-gradient(circle at 38% 32%,#F6CB63,#D69A33);box-shadow:0 0 0 4px rgba(229,167,52,.16)}
.tabs{position:fixed;left:50%;right:auto;bottom:calc(13px + env(safe-area-inset-bottom));width:min(430px,calc(100vw - 28px));transform:translateX(-50%);display:flex;align-items:center;gap:4px;padding:6px;border-radius:32px;background:linear-gradient(180deg,rgba(255,255,255,.82),rgba(248,242,238,.66));-webkit-backdrop-filter:blur(26px) saturate(1.45);backdrop-filter:blur(26px) saturate(1.45);border:1px solid rgba(255,255,255,.82);box-shadow:0 18px 34px rgba(33,28,26,.22),0 4px 10px rgba(33,28,26,.10),inset 0 1px 0 rgba(255,255,255,.9),inset 0 -1px 0 rgba(33,28,26,.06);z-index:30}
.tabs:before{content:"";position:absolute;inset:1px;border-radius:31px;border:1px solid rgba(33,28,26,.035);pointer-events:none}
.tab{position:relative;flex:1;min-width:0;height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 2px;cursor:pointer;color:#7D746E;font-size:9.8px;font-weight:700;letter-spacing:0;line-height:1;transition:color .22s ease,transform .22s ease}
.tab.on{color:var(--roseDeep);transform:translateY(-1px)}
.tab:before{display:none}
.tabglow{position:absolute;top:6px;bottom:6px;left:0;width:0;border-radius:28px;background:rgba(255,255,255,.92);box-shadow:0 8px 18px rgba(33,28,26,.10),inset 0 1px 0 rgba(255,255,255,.96);z-index:0;pointer-events:none;transition:transform .44s var(--spring),width .44s var(--spring)}
.tab{z-index:1}
.tab svg{width:22px;height:22px;display:block;stroke-width:2.15;transition:transform .24s cubic-bezier(.2,.8,.2,1)}.tab.on svg{filter:drop-shadow(0 2px 4px rgba(194,94,118,.18));transform:scale(1.08)}
.chatwrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;justify-content:flex-end;gap:10px;padding:8px 0 10px}
.msg{max-width:86%;font-size:13.5px;line-height:1.5;white-space:pre-wrap}
.msg.me{align-self:flex-end;background:var(--ink);color:#fff;padding:10px 14px;border-radius:16px 16px 4px 16px}
.msg.ai{align-self:flex-start;background:#fff;border:1px solid var(--line);padding:12px 14px;border-radius:16px 16px 16px 4px}
.composer{position:fixed;bottom:calc(106px + env(safe-area-inset-bottom));left:0;right:0;max-width:480px;margin:0 auto;padding:8px 12px;display:flex;align-items:flex-end;gap:8px;background:var(--paper);z-index:20}
.composer:before{content:"";position:absolute;left:0;right:0;top:-22px;height:22px;background:linear-gradient(180deg,rgba(250,245,242,0),var(--paper));pointer-events:none}
.composer:after{content:"";position:fixed;left:0;right:0;bottom:0;height:calc(100px + env(safe-area-inset-bottom));background:var(--paper);z-index:-1;pointer-events:none}
.composer input{flex:1;min-width:0;height:42px;border:1px solid var(--line);border-radius:18px;padding:0 15px;font-size:14px;font-family:var(--sans);outline:none;background:#fff}
.composer button{height:42px;min-width:48px;border:none;background:var(--roseDeep);color:#fff;border-radius:18px;padding:0 16px;font-weight:700;cursor:pointer}.composer #cmic{background:var(--paper2);color:var(--roseDeep);min-width:46px;font-size:18px;padding:0 12px}.composer #cmic.rec{background:var(--roseDeep);color:#fff;animation:micpulse 1.1s ease infinite}@keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(194,94,118,.55)}70%{box-shadow:0 0 0 10px rgba(194,94,118,0)}}
.prow{display:flex;gap:8px;margin:0 0 14px}
.pbtn{flex:1;border:none;border-radius:14px;padding:12px;font-family:var(--sans);font-weight:600;font-size:13px;cursor:pointer;background:var(--accent-grad);color:#fff}
.pbtn.alt{background:var(--paper2);color:var(--roseDeep)}
.pbtn:active{transform:scale(.97)}
.minirow{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.seg{border:1px solid var(--line);background:#fff;color:var(--inkMid);border-radius:999px;padding:8px 12px;font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer}
.seg.on{background:var(--roseDeep);border-color:var(--roseDeep);color:#fff}
.symadd{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:9px}.symadd input{min-width:0;border:1px solid var(--line);border-radius:14px;background:#fff;padding:0 12px;font-family:var(--sans);font-size:13px;color:var(--ink);height:38px}.symadd button{border:none;border-radius:14px;background:var(--roseDeep);color:#fff;font-family:var(--sans);font-weight:800;font-size:12px;padding:0 12px}
.kv{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
.kv .stat{margin:0}
.toast{position:fixed;left:12px;right:12px;bottom:calc(106px + env(safe-area-inset-bottom));max-width:456px;margin:0 auto;background:var(--ink);color:#fff;border-radius:16px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:80;font-size:13px;box-shadow:0 12px 30px rgba(0,0,0,.18)}
.toast button{border:none;background:#fff;color:var(--ink);border-radius:999px;padding:7px 11px;font-weight:800}
.editbar{display:flex;gap:8px;margin:12px 0}.editbar .pbtn{padding:11px 10px}
.editnote{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--roseLine);background:rgba(251,228,233,.58);border-radius:18px;padding:12px 13px;margin:10px 0 12px;color:var(--inkMid);font-size:12px;line-height:1.45}
.editnote b{color:var(--roseDeep)}
.delaychip{color:#6E635C;background:#EFEAE6}
.phasegrid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:10px}
.phasecard{border:1px solid var(--line);border-radius:18px;padding:13px 14px;background:#fff}
.phasecard.on{box-shadow:0 0 0 2px currentColor inset}
.phasecard .pt{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:7px}
.phasecard .pn{font-family:var(--serif);font-size:18px;font-weight:600}
.phasecard .pd{font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}
.phasecard .pb{font-size:12.5px;line-height:1.5;color:var(--inkMid)}
.phasecard .plst{display:grid;gap:4px;margin-top:8px;font-size:12px;line-height:1.42}
.phasecompact{border-radius:18px;border:1px solid var(--line);padding:14px;background:#fff}
.phasecompact .pn{font-family:var(--serif);font-size:20px;font-weight:600;margin-top:3px}
.phasecompact .pb{font-size:12.5px;line-height:1.5;color:var(--inkMid);margin-top:6px}
.phasecompact .minirow{margin-top:10px}
.phasepill{border-radius:999px;padding:7px 10px;font-size:11px;font-weight:800;background:#fff;color:var(--inkMid);border:1px solid rgba(33,28,26,.07)}
.foodhero{background:linear-gradient(135deg,#FBEFCB 0%,#FBE4E9 86%);border-color:#F2D7B5}
.foodchips,.trainchips{display:flex;flex-wrap:wrap;gap:7px;margin:11px 0 4px}
.nutrichip{border-radius:999px;padding:7px 10px;font-size:11px;font-weight:800;background:#fff;color:var(--inkMid);border:1px solid rgba(33,28,26,.07)}
.mealcard{display:grid;grid-template-columns:38px 1fr;gap:11px;align-items:start;padding:12px 0;border-top:1px solid var(--line)}
.mealico{width:38px;height:38px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:19px;background:var(--paper2)}
.mealmain{min-width:0}.mealtop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.swapbtn{border:1px solid var(--line);background:#fff;color:var(--roseDeep);border-radius:999px;padding:6px 10px;font-family:var(--sans);font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap}
.swapbtn:active{transform:scale(.96)}
.mealwhy{font-size:11px;line-height:1.45;color:var(--inkMid);margin-top:4px}
.trainrow{display:grid;grid-template-columns:1fr;gap:7px;padding:12px 0;border-top:1px solid var(--line)}
.trainrow .tn{font-weight:800;font-size:13.5px}.trainrow .tb{font-size:12px;color:var(--ink);line-height:1.45}.trainrow .th{font-size:11.5px;color:var(--inkSoft);line-height:1.45}
.trainrow.rich{grid-template-columns:38px 1fr;gap:11px;align-items:start}
.trainico{width:38px;height:38px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:var(--inkMid);background:var(--sageWash)}
.trainhead{display:grid;grid-template-columns:1fr;gap:4px;background:var(--paper2);border-radius:14px;padding:10px 12px;color:var(--inkSoft);font-size:10px;text-transform:uppercase;font-weight:800;letter-spacing:.04em}
.trainmeta{display:grid;gap:6px;margin-top:6px}
.trainmeta .ml{font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--inkSoft);font-weight:900}
.trainmeta .mv{font-size:11.7px;line-height:1.42;color:var(--inkMid)}
.sciencegrid{display:grid;gap:8px;margin-top:10px}
.sciencerow{display:grid;grid-template-columns:28px 1fr;gap:9px;align-items:start;border-top:1px solid var(--line);padding-top:8px}
.sciencerow:first-child{border-top:none;padding-top:0}
.sciencen{width:28px;height:28px;border-radius:10px;background:var(--roseWash);color:var(--roseDeep);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900}
.sciencet{font-size:12.5px;line-height:1.48;color:var(--inkMid)}
.profileform{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.profileform label{display:grid;gap:5px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--inkSoft);font-weight:800}
.profileform input{width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:13px;background:#fff;padding:10px 9px;font-family:var(--sans);font-size:13px;color:var(--ink)}
.profileactions{display:flex;gap:8px;margin-top:10px}
.delaycard{border-color:#DDD4CE;background:#F2EEEB}
.delaycard .sec{color:#6E635C}
.menocheck{display:grid;gap:9px;margin-top:10px}.menorow{display:grid;grid-template-columns:34px 1fr;gap:10px;align-items:start;border-top:1px solid var(--line);padding-top:10px}.menorow:first-child{border-top:none;padding-top:0}.menoico{width:34px;height:34px;border-radius:13px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:var(--roseDeep);letter-spacing:.03em}
.menorow .rt{font-size:13.5px;font-weight:700;color:var(--ink)}
.menorow .rb{font-size:12px;line-height:1.45;color:var(--inkMid);margin-top:3px}.due{display:inline-flex;margin-top:6px;border-radius:999px;background:var(--roseWash);color:var(--roseDeep);padding:5px 8px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.04em}.redflag{border-color:#F1C7CF;background:#FFF7F8}.redflag .sec{color:#A7465A}.urgent{display:grid;gap:7px}.urgent div{font-size:12.5px;line-height:1.5;color:var(--inkMid);padding-left:18px;position:relative}.urgent div:before{content:"";position:absolute;left:2px;top:.55em;width:7px;height:7px;border-radius:50%;background:#C25E76}
.emptygraph{min-height:132px;border-radius:16px;background:linear-gradient(180deg,#fff 0%,#F4ECE7 100%);display:flex;align-items:center;justify-content:center;text-align:center;color:var(--inkSoft);font-size:12px;line-height:1.5;padding:18px}
.homebtn{display:block;width:100%;margin:18px 0 2px;padding:13px;border:1px solid var(--roseLine);background:var(--roseWash);color:var(--roseDeep);border-radius:16px;font-family:var(--sans);font-weight:600;font-size:13.5px;cursor:pointer}
.homebtn:active{transform:scale(.98)}
.partnerbox{border-radius:16px;border:1px solid var(--line);background:#fff;padding:12px;margin-top:10px;word-break:break-word;font-family:var(--sans)}
.partnerbox .ln,.partnernote{font-family:var(--sans);font-size:13px;line-height:1.5;color:var(--inkMid)}
.partnerstatus{font-family:var(--sans);font-size:13.5px;line-height:1.5;color:var(--ink);margin-top:8px}
.copylink{width:100%;margin-top:10px;border:none;border-radius:14px;background:var(--roseDeep);color:#fff;padding:11px 12px;font-family:var(--sans);font-weight:800;cursor:pointer}
.copylink.danger{background:#EFEAE6;color:#6E635C;border:1px solid var(--line)}
.copylink:active{transform:scale(.98)}
.think{display:inline-flex;gap:4px;align-items:center;color:var(--roseDeep);font-size:13px;font-style:italic}
.think{white-space:nowrap}
.think span:not(.tt){width:4px;height:4px;border-radius:50%;background:var(--rose);animation:dp 1s infinite}
.think .tt{display:inline-block;white-space:nowrap;transition:opacity .22s ease;opacity:1}
.think span:nth-child(2){animation-delay:.16s}.think span:nth-child(3){animation-delay:.32s}
@keyframes dp{0%,100%{opacity:.3}50%{opacity:1}}
/* --- technique upgrades (вдохновлено sber-tma: сегмент-индикатор, переходы, cells) --- */
@keyframes scrin{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.chip,.pbtn,.seg,.swapbtn,.copylink,.homebtn,.calnav,.segbtn{transition:transform .12s ease,background .18s ease,color .18s ease,box-shadow .18s ease}
.chip:active,.swapbtn:active,.calnav:active,.seg:active{transform:scale(.96)}
.segctl{position:relative;display:flex;background:var(--paper2);border-radius:14px;padding:4px;margin-top:6px}
.segctl .segind{position:absolute;top:4px;bottom:4px;left:4px;width:calc((100% - 8px)/3);border-radius:11px;background:#fff;box-shadow:0 3px 8px rgba(33,28,26,.10),0 1px 1px rgba(33,28,26,.04);transition:transform .42s var(--spring),opacity .2s ease;opacity:0;will-change:transform}
.segctl[data-on="1"] .segind{opacity:1;transform:translateX(0)}
.segctl[data-on="2"] .segind{opacity:1;transform:translateX(100%)}
.segctl[data-on="3"] .segind{opacity:1;transform:translateX(200%)}
.segctl .segbtn{position:relative;z-index:1;flex:1;border:none;background:transparent;font-family:var(--sans);font-size:13px;font-weight:700;color:var(--inkMid);padding:9px 0;cursor:pointer}
.segctl .segbtn.on{color:var(--roseDeep)}
.cells{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-top:10px}
.cellrow{display:flex;align-items:center;gap:12px;padding:13px 14px;border-top:1px solid var(--line);cursor:pointer;transition:background .15s ease}
.cellrow:first-child{border-top:none}
.cellrow:active{background:var(--paper2)}
.cellrow .ci{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;background:var(--roseWash)}
.cellrow .ctxt{flex:1;min-width:0}

function cycleChart(hist){
  var items=hist.filter(function(h){return h.len!=null;}).slice(-7);
  var pts=items.map(function(h){return h.len;});
  if(pts.length<2) return '';
  var W=340,H=176,padL=34,padR=14,padT=24,padB=34;
  var lo=Math.min.apply(null,pts),hi=Math.max.apply(null,pts);
  lo=Math.min(lo,21)-2; hi=Math.max(hi,35)+2; if(hi-lo<6){hi=lo+6;}
  function X(i){return padL+(W-padL-padR)*(pts.length<2?0:i/(pts.length-1));}
  function Y(v){return H-padB-(H-padT-padB)*(v-lo)/(hi-lo);}
  var bandTop=Y(35),bandBot=Y(21);
  var path='';pts.forEach(function(v,i){path+=(i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)+' ';});
  var dots='';pts.forEach(function(v,i){var nrm=(v>=21&&v<=35),x=X(i),y=Y(v),st=items[i].start.split('-');dots+="<circle cx='"+x.toFixed(1)+"' cy='"+y.toFixed(1)+"' r='5' fill='"+(nrm?'#8A7F78':'#E5A734')+"'/><text x='"+x.toFixed(1)+"' y='"+(y-9).toFixed(1)+"' text-anchor='middle' font-size='10' fill='#6E635C' font-weight='700'>"+v+"</text><text x='"+x.toFixed(1)+"' y='"+(H-10)+"' text-anchor='middle' font-size='9' fill='#A89C93'>"+parseInt(st[2],10)+"."+st[1]+"</text>";});
  return "<svg viewBox='0 0 "+W+" "+H+"' style='width:100%;height:auto;display:block'>"+
    "<rect x='"+padL+"' y='"+bandTop.toFixed(1)+"' width='"+(W-padL-padR)+"' height='"+Math.max(0,bandBot-bandTop).toFixed(1)+"' rx='6' fill='#EFEAE6'/>"+
    "<text x='4' y='"+Y(35).toFixed(1)+"' font-size='9' fill='#A89C93'>35</text><text x='4' y='"+Y(28).toFixed(1)+"' font-size='9' fill='#A89C93'>28</text><text x='4' y='"+Y(21).toFixed(1)+"' font-size='9' fill='#A89C93'>21</text>"+
    "<path d='"+path+"' fill='none' stroke='#C4BAB3' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/>"+dots+"</svg>";
}

  h+="<div id='hub-data' class='hubpanel hidden'><div class='hubgrid3'><input id='hubH' inputmode='decimal' placeholder='Рост' value='"+esc(p.height||"")+"'><input id='hubW' inputmode='decimal' placeholder='Вес' value='"+esc(p.weight||"")+"'><input id='hubA' inputmode='numeric' placeholder='Возраст' value='"+esc(p.age||"")+"'></div><div class='trlabel' style='margin:12px 2px 6px'>Желаемые калории <span style='text-transform:none;letter-spacing:0;font-weight:600;color:var(--inkSoft)'>&middot; необязательно</span></div><input id='hubKcal' class='tpin' inputmode='numeric' placeholder='напр. 1700 &middot; пусто = рассчитаю сама' value='"+esc(p.kcal_goal||"")+"'><div class='trpick' style='margin-top:8px'><div class='trpill' onclick='setKcalPreset(0.8)'>Дефицит</div><div class='trpill' onclick='setKcalPreset(1)'>Норма</div><div class='trpill' onclick='setKcalPreset(1.12)'>Профицит</div></div><div class='cc' style='margin-top:6px'>"+((D&&D.kcal_base)?('Норма для тебя ~'+D.kcal_base+' ккал в день'):'Заполни рост, вес и возраст — рассчитаю норму.')+"</div><button class='pbtn' style='margin-top:10px' onclick='saveHubProfile()'>Сохранить</button></div>";
  h+="<div class='cellrow' onclick=\"hubToggle('time')\"><div class='ci'>⏰</div><div class='ctxt'><div class='ct'>Время утренней сводки</div><div class='cc'>"+(D.send_time||"08:00")+" · МСК</div></div><div class='chev'>›</div></div>";
  h+="<div id='hub-time' class='hubpanel hidden'><input id='hubTime' placeholder='09:00' value='"+esc(D.send_time||"08:00")+"'><button class='pbtn' style='margin-top:8px' onclick='saveHubTime()'>Сохранить</button></div>";
  h+="<div class='cellrow' onclick='hubPartner()'><div class='ci'>❤️</div><div class='ctxt'><div class='ct'>Партнёр и близкие</div><div class='cc'>"+(D.partner_linked?"подключён":"короткая сводка партнёру")+"</div></div><div class='chev'>›</div></div>";
  h+="<div id='hub-partner' class='hubpanel hidden'></div>";
  h+="</div>";
  document.getElementById('hub').innerHTML=h;
}
async function chooseMode(m){var r=await api('/api/mode',{mode:m});if(r&&r.ok){toast("Режим: "+modeLabel(m));closeHub();await reloadAfterEdit();}else{toast((r&&r.text)||"Не получилось сменить режим");}}
function switchPreg(){chooseMode('preg');}
async function saveHubPrefs(){var t=(document.getElementById('hubPrefs').value||"").trim();var r=await api('/api/prefs',{diet_note:t});if(r&&r.ok){D.profile=D.profile||{};D.profile.diet_note=r.diet_note;loadedFood=false;toast("Сохранила предпочтения");}else toast("Не получилось сохранить");}
async function saveHubProfile(){var h=parseFloat(String(document.getElementById('hubH').value||"").replace(",","."));var w=parseFloat(String(document.getElementById('hubW').value||"").replace(",","."));var a=parseInt(String(document.getElementById('hubA').value||""),10);if(!(h>120&&h<220&&w>30&&w<250&&a>10&&a<80)){toast("Проверь рост, вес и возраст");return;}var _kc=(document.getElementById('hubKcal')&&document.getElementById('hubKcal').value||"").trim();var r=await api('/api/profile',{height:h,weight:w,age:a,kcal_goal:_kc});if(r&&r.ok){D.profile=r.profile;if(r.kcal_base)D.kcal_base=r.kcal_base;loadedFood=false;toast(_kc&&r.profile&&r.profile.kcal_goal?("Цель: "+r.profile.kcal_goal+" ккал"):"Данные обновлены");renderHub();}else toast((r&&r.text)||"Не получилось сохранить");}
function setKcalPreset(m){var b=(D&&D.kcal_base)||0;if(!b){toast('Заполни рост, вес и возраст');return;}var el=document.getElementById('hubKcal');if(el)el.value=Math.round(b*m/10)*10;}
async function saveHubTime(){var t=(document.getElementById('hubTime').value||"").trim();var r=await api('/api/settime',{time:t});if(r&&r.ok){D.send_time=r.send_time;toast("Сводка в "+r.send_time);renderHub();}else toast((r&&r.text)||"Время в формате 09:00");}
async function getReport(){toast("Готовлю выписку…");var r=await api('/api/report',{period:'all'});if(r&&r.ok)toast("Выписка отправлена в чат бота");else toast((r&&r.text)||"Выписка временно недоступна");}
async function hubPartner(){var box=document.getElementById('hub-partner');['mode','prefs','data','time'].forEach(function(x){var e=document.getElementById('hub-'+x);if(e)e.classList.add('hidden');});box.classList.remove('hidden');box.innerHTML="<div style='font-size:13px;color:var(--inkMid)'>Готовлю ссылку…</div>";var r=await api('/api/partner',{});if(r&&r.linked){box.innerHTML="<div class='partnerstatus'>Партнёр подключён.</div><button class='copylink danger' onclick='unlinkPartnerHub()'>Отключить партнёра</button>";return;}if(!(r&&r.link)){box.innerHTML="<div style='font-size:13px;color:var(--inkMid)'>Ссылка будет доступна после запуска из Telegram. В боте — команда /partner.</div>";return;}box.innerHTML="<div class='partnernote'>Перешли ссылку партнёру — он подтвердит подключение в боте.</div><div class='partnerbox'><div class='ln' id='hubPlink'>"+esc(r.link)+"</div><button class='copylink' onclick='copyHubLink()'>Скопировать ссылку</button></div>";}
async function unlinkPartnerHub(){var r=await api('/api/partner',{action:'unlink'});if(r&&r.ok){D.partner_linked=false;toast("Партнёр отключён");hubPartner();}}
function copyHubLink(){var t=document.getElementById('hubPlink');if(!t)return;var s=t.textContent||"";if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(s).then(function(){toast("Ссылка скопирована");}).catch(function(){toast("Ссылка готова");});}else toast("Ссылка готова");}

const MLVL={1:"плохое",2:"нормальное",3:"хорошее"};
const THINKS=["Айва думает","подбирает рекомендации","сверяет с твоей фазой","проверяет твои данные","собирает ответ"];
function bloaderHTML(cls){var p="";for(var i=0;i<5;i++){p+="<span class='bp' style='--r:"+(i*72)+"deg;transform:rotate("+(i*72)+"deg);animation-delay:"+(i*0.12)+"s'></span>";}return "<span class='bload "+(cls||"")+"'>"+p+"<span class='bc'></span></span>";}
function thinkHTML(label){return "<span class='thinkrow'>"+bloaderHTML('sm')+"<span class='think'>"+(label||"Айва думает")+"<span></span><span></span><span></span></span></span>";}
function startThink(){var i=0;return setInterval(function(){i=(i+1)%THINKS.length;var ns=document.querySelectorAll('.think .tt');for(var k=0;k<ns.length;k++){(function(e){e.style.opacity='0';setTimeout(function(){e.textContent=THINKS[i];e.style.opacity='1';},230);})(ns[k]);}},2700);}
function placeAvatar(){var g=document.querySelector('#scr-today .greet');if(!g)return;if(g.parentNode&&g.parentNode.classList&&g.parentNode.classList.contains('greetrow'))return;var wrap=document.createElement('div');wrap.className='greetrow';g.parentNode.insertBefore(wrap,g);wrap.appendChild(g);var av=document.createElement('div');av.className='avatar';av.id='avatar';av.textContent=(NAME&&NAME.trim())?NAME.trim().charAt(0):'•';av.onclick=openHub;wrap.appendChild(av);}
function pastCal(){
  var pp=(D&&D.past_periods)||[];if(!pp.length)return "";
  var set={};
  pp.forEach(function(p){var s=new Date(p.start+"T00:00:00");var e=p.end?new Date(p.end+"T00:00:00"):new Date(s.getTime()+4*86400000);for(var d=new Date(s);d<=e;d.setDate(d.getDate()+1)){set[isoOf(d)]=true;}});
  var html="<div class='card'><div class='sec' style='margin-top:0'>Календарь месячных</div>";
  for(var mo=2;mo>=0;mo--){
    var base=new Date(today.getFullYear(),today.getMonth()-mo,1),y=base.getFullYear(),m=base.getMonth();
    var fw=(new Date(y,m,1).getDay()+6)%7,dim=new Date(y,m+1,0).getDate();
    html+="<div class='sec' style='font-size:14px;margin:14px 0 8px'>"+MNOM[m]+" "+y+"</div><div class='cal'>";
    WD.forEach(function(w){html+="<div class='wd'>"+w+"</div>";});
    for(var i=0;i<fw;i++)html+="<div class='day empty'></div>";
    for(var d2=1;d2<=dim;d2++){var iso=isoOf(new Date(y,m,d2));html+="<div class='day'"+(set[iso]?" style='background:"+COL.men+";color:#fff'":"")+">"+d2+"</div>";}
    html+="</div>";
  }
  html+="<div class='legend'><div class='lg'><span class='dot' style='background:"+COL.men+"'></span>Месячные</div></div></div>";
  return html;
}
function periodHistory(){var pp=(D&&D.past_periods)||[];if(!pp.length)return "";var arr=[];for(var i=pp.length-1;i>=0;i--){var p=pp[i];var len=(i<pp.length-1)?Math.round((new Date(pp[i+1].start+"T00:00:00")-new Date(pp[i].start+"T00:00:00"))/86400000):null;arr.push("<div class='mealcard'><div class='mealico'>🩸</div><div style='min-width:0'><div class='ds'>с "+fmtD(p.start)+(p.end?(" по "+fmtD(p.end)):"")+"</div><div class='mealwhy'>"+((len&&len>=15&&len<=90)?("цикл "+len+" дней"):"отмеченные месячные")+"</div></div></div>");}return "<div class='card'><div class='sec' style='margin-top:0'>История месячных</div>"+expandList(arr,4,"Показать ещё циклы")+"</div>";}
function expandList(arr,shown,label){if(arr.length<=shown)return arr.join("");var id="ex"+Math.floor(Math.random()*1e6),n=arr.length-shown,more=label+" ("+n+")";return arr.slice(0,shown).join("")+"<div id='"+id+"' class='hidden'>"+arr.slice(shown).join("")+"</div><button class='chip' style='margin:8px 2px 0' onclick=\"var e=document.getElementById('"+id+"');e.classList.toggle('hidden');this.textContent=e.classList.contains('hidden')?'"+more+"':'Свернуть';\">"+more+"</button>";}
function symptomDiary(){var logs=(D&&D.sym_log)||[];logs=logs.filter(function(l){return (l.symptoms&&l.symptoms.length)||l.energy||l.mood;});if(!logs.length)return "<div class='emptygraph'>Пока нет отметок. Отмечай самочувствие и симптомы на экране «Сегодня» — здесь появится дневник.</div>";logs=logs.slice().reverse();var arr=logs.map(function(l){var syms=(l.symptoms||[]).map(symLabel).filter(Boolean);var meta=[];if(l.energy)meta.push("энергия "+(LVL[l.energy]||""));if(l.mood)meta.push("настроение "+(MLVL[l.mood]||""));var chips=syms.map(function(s){return "<span class='nutrichip'>"+esc(s)+"</span>";}).join("");return "<div class='mealcard'><div class='mealico'>📝</div><div style='min-width:0'><div class='ds'>"+fmtD(l.date)+"</div>"+(meta.length?"<div class='mealwhy'>"+meta.join(" · ")+"</div>":"")+(chips?"<div class='foodchips' style='margin-top:6px'>"+chips+"</div>":"")+"</div></div>";});return expandList(arr,6,"Показать ещё");}
function applyViewport(){if(!tg)return;try{var sa=(tg.safeAreaInset&&tg.safeAreaInset.top)||0;var ca=(tg.contentSafeAreaInset&&tg.contentSafeAreaInset.top)||0;var t=sa+ca;if(tg.isFullscreen&&t<44)t=56;document.documentElement.style.setProperty('--safe-top',t+'px');}catch(e){}}
if(tg){try{tg.onEvent&&tg.onEvent('viewportChanged',applyViewport);tg.onEvent&&tg.onEvent('safeAreaChanged',applyViewport);tg.onEvent&&tg.onEvent('contentSafeAreaChanged',applyViewport);tg.onEvent&&tg.onEvent('fullscreenChanged',applyViewport);}catch(e){}applyViewport();setTimeout(applyViewport,800);}

document.addEventListener('click',function(e){var b=e.target.closest&&e.target.closest('.pbtn,.chip,.swapbtn,.copylink');if(!b)return;haptic('impact','light');var r=document.createElement('span');r.className='ripple';var rc=b.getBoundingClientRect();r.style.left=(e.clientX-rc.left)+'px';r.style.top=(e.clientY-rc.top)+'px';b.appendChild(r);setTimeout(function(){if(r.parentNode)r.parentNode.removeChild(r);},600);});
function boot(){renderToday();go('today');}
if(INIT){api('/api/data',{name:NAME}).then(function(d){if(d&&d.onboarded){D=d;boot();}else{showNeedOnboard();}});}
else{D={onboarded:true,cycle:true,last_period:null,cycle_len:28,name:NAME};boot();}
</script>
