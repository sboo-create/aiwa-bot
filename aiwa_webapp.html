<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Айва</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#FAF5F2;--paper2:#F4ECE7;--ink:#211C1A;--inkMid:#6E635C;--inkSoft:#A89C93;
--rose:#E0879A;--roseDeep:#C25E76;--roseWash:#FBE4E9;--roseLine:#F2C9D3;--quince:#E5A734;--quinceWash:#FBEFCB;--quinceDeep:#C98A1E;
--sage:#94A97E;--sageWash:#E6EBDD;--line:rgba(33,28,26,0.08);--serif:'Cormorant Garamond',Georgia,serif;--sans:'Manrope',system-ui,sans-serif}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding:16px 16px calc(122px + env(safe-area-inset-bottom))}
.bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.brand{display:flex;align-items:center;gap:8px}.brand .nm{font-family:var(--serif);font-size:21px;font-weight:600}
.date{font-size:12px;color:var(--inkSoft)}
.eyebrow{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--inkSoft);font-weight:600}
.greet{font-family:var(--serif);font-size:30px;font-weight:500;line-height:1.1;margin:6px 0 16px}.greet .nm{color:var(--roseDeep)}
.h{font-family:var(--serif);font-size:26px;font-weight:500;margin:4px 0 14px}
.ayva{border-radius:20px;padding:16px;margin-bottom:16px;border:1px solid var(--roseLine);background:linear-gradient(120deg,var(--roseWash) 0%,var(--quinceWash) 125%)}
.ayva-top{display:flex;gap:11px;align-items:flex-start}
.ayva-lab{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--roseDeep);margin-bottom:5px}
.ayva-txt{font-size:13.5px;line-height:1.55;color:var(--ink);white-space:pre-wrap}
.medline{font-size:11.5px;line-height:1.45;color:var(--inkMid);margin-top:10px;padding-top:10px;border-top:1px solid rgba(194,94,118,.14)}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px}
.chip{font-size:11.5px;font-weight:500;padding:8px 13px;border-radius:999px;border:1px solid rgba(194,94,118,.18);background:rgba(255,255,255,.72);color:var(--roseDeep);cursor:pointer;text-align:left}
.msg.ai .chip{background:#fff;border-color:var(--roseLine);box-shadow:0 1px 0 rgba(33,28,26,.03)}
.chip:active{transform:scale(.96)}
.card{background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:18px;margin-bottom:14px}
.tag{display:inline-flex;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:5px 11px;border-radius:999px}
.pl{display:flex;align-items:center;gap:10px;margin-bottom:6px}.psub{font-size:13px;color:var(--inkMid)}
.pday{font-family:var(--serif);font-size:38px;font-weight:500;line-height:1;margin-top:6px}
.pmeta{font-size:12.5px;color:var(--inkSoft);margin-top:6px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--paper2);border-radius:16px;padding:13px 12px}
.stat .l{font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--inkSoft);font-weight:600}
.stat .v{font-family:var(--serif);font-size:23px;font-weight:500;margin-top:4px}.stat .s{font-size:10.5px;color:var(--inkSoft)}
.sec{font-family:var(--serif);font-size:18px;font-weight:500;margin:18px 2px 10px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.calhead{display:flex;align-items:center;justify-content:space-between;margin:18px 2px 10px}
.calnav{border:none;background:var(--paper2);color:var(--roseDeep);width:34px;height:34px;border-radius:11px;font-size:20px;line-height:1;cursor:pointer;font-family:var(--sans)}
.calnav:active{transform:scale(.94)}
.calhint{font-size:11px;color:var(--inkSoft);text-align:center;margin-top:8px;min-height:14px}
.wd{text-align:center;font-size:10px;color:var(--inkSoft);font-weight:600}
.day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:13px;border:2px solid transparent;background:transparent;font-family:var(--sans);padding:0;color:var(--ink)}
.day:not(.empty){cursor:pointer}.day:disabled{cursor:default;opacity:.45}
.day.empty{border:none}.day.today{background:var(--ink);color:#fff;font-weight:700}
.legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin:14px 2px 0}
.lg{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--inkMid)}.dot{width:10px;height:10px;border-radius:50%}
.macros{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.mac{background:var(--paper2);border-radius:14px;padding:10px;text-align:center}
.mac .l{font-size:9.5px;text-transform:uppercase;color:var(--inkSoft);font-weight:600}.mac .v{font-family:var(--serif);font-size:20px;margin-top:2px}
.meal{display:flex;gap:11px;align-items:flex-start;padding:9px 0;border-top:1px solid var(--line)}
.meal .sw{width:34px;height:34px;border-radius:11px;flex-shrink:0}
.meal .tm{font-size:10px;color:var(--inkSoft);font-weight:600}.meal .ds{font-size:13.5px;font-weight:600}.meal .nt{font-size:11.5px;color:var(--inkSoft)}
.foot{font-size:11px;color:var(--inkSoft);text-align:center;margin-top:20px;line-height:1.5}
.blossom{position:relative;flex-shrink:0}
.petal{position:absolute;left:50%;top:50%;transform-origin:50% 86%;background:radial-gradient(115% 88% at 50% 14%,#FFF 0%,var(--roseWash) 34%,var(--rose) 92%);border-radius:50% 50% 46% 46% / 62% 62% 38% 38%;box-shadow:inset 0 -6px 12px rgba(194,94,118,.28),inset 0 3px 6px rgba(255,255,255,.6)}
.core{position:absolute;left:50%;top:50%;border-radius:50%;background:radial-gradient(circle at 38% 32%,#F2C24E,var(--quinceDeep));box-shadow:0 0 0 4px rgba(229,167,52,.16)}
.tabs{position:fixed;left:50%;right:auto;bottom:calc(13px + env(safe-area-inset-bottom));width:min(430px,calc(100vw - 28px));transform:translateX(-50%);display:flex;align-items:center;gap:4px;padding:6px;border-radius:32px;background:linear-gradient(180deg,rgba(255,255,255,.82),rgba(248,242,238,.66));-webkit-backdrop-filter:blur(26px) saturate(1.45);backdrop-filter:blur(26px) saturate(1.45);border:1px solid rgba(255,255,255,.82);box-shadow:0 18px 34px rgba(33,28,26,.22),0 4px 10px rgba(33,28,26,.10),inset 0 1px 0 rgba(255,255,255,.9),inset 0 -1px 0 rgba(33,28,26,.06);z-index:30}
.tabs:before{content:"";position:absolute;inset:1px;border-radius:31px;border:1px solid rgba(33,28,26,.035);pointer-events:none}
.tab{position:relative;flex:1;min-width:0;height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 2px;cursor:pointer;color:#7D746E;font-size:9.8px;font-weight:700;letter-spacing:0;line-height:1;transition:color .18s ease,transform .18s ease}
.tab.on{color:var(--roseDeep);transform:translateY(-1px)}
.tab.on:before{content:"";position:absolute;inset:0;border-radius:28px;background:rgba(255,255,255,.86);box-shadow:0 8px 18px rgba(33,28,26,.08),inset 0 1px 0 rgba(255,255,255,.96);z-index:-1}
.tab svg{width:22px;height:22px;display:block;stroke-width:2.15}.tab.on svg{filter:drop-shadow(0 2px 4px rgba(194,94,118,.15))}
.chatwrap{display:flex;flex-direction:column;gap:12px;min-height:calc(100vh - 170px);padding-bottom:158px}
.msg{max-width:86%;font-size:13.5px;line-height:1.5;white-space:pre-wrap}
.msg.me{align-self:flex-end;background:var(--ink);color:#fff;padding:10px 14px;border-radius:16px 16px 4px 16px}
.msg.ai{align-self:flex-start;background:#fff;border:1px solid var(--line);padding:12px 14px;border-radius:16px 16px 16px 4px}
.composer{position:fixed;bottom:calc(106px + env(safe-area-inset-bottom));left:0;right:0;max-width:480px;margin:0 auto;padding:8px 12px;display:flex;align-items:flex-end;gap:8px;background:linear-gradient(180deg,rgba(250,245,242,0),var(--paper) 32%);z-index:20}
.composer input{flex:1;min-width:0;height:42px;border:1px solid var(--line);border-radius:18px;padding:0 15px;font-size:14px;font-family:var(--sans);outline:none;background:#fff}
.composer button{height:42px;min-width:48px;border:none;background:var(--roseDeep);color:#fff;border-radius:18px;padding:0 16px;font-weight:700;cursor:pointer}
.prow{display:flex;gap:8px;margin:0 0 14px}
.pbtn{flex:1;border:none;border-radius:14px;padding:12px;font-family:var(--sans);font-weight:600;font-size:13px;cursor:pointer;background:var(--roseDeep);color:#fff}
.pbtn.alt{background:var(--paper2);color:var(--roseDeep)}
.pbtn:active{transform:scale(.97)}
.minirow{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.seg{border:1px solid var(--line);background:#fff;color:var(--inkMid);border-radius:999px;padding:8px 12px;font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer}
.seg.on{background:var(--roseDeep);border-color:var(--roseDeep);color:#fff}
.kv{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
.kv .stat{margin:0}
.toast{position:fixed;left:12px;right:12px;bottom:calc(106px + env(safe-area-inset-bottom));max-width:456px;margin:0 auto;background:var(--ink);color:#fff;border-radius:16px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:80;font-size:13px;box-shadow:0 12px 30px rgba(0,0,0,.18)}
.toast button{border:none;background:#fff;color:var(--ink);border-radius:999px;padding:7px 11px;font-weight:800}
.editbar{display:flex;gap:8px;margin:12px 0}.editbar .pbtn{padding:11px 10px}
.editnote{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--roseLine);background:rgba(251,228,233,.58);border-radius:18px;padding:12px 13px;margin:10px 0 12px;color:var(--inkMid);font-size:12px;line-height:1.45}
.editnote b{color:var(--roseDeep)}
.delaychip{color:#6E635C;background:#EFEAE6}
.phasegrid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:10px}
.phasecard{border:1px solid var(--line);border-radius:18px;padding:13px 14px;background:#fff}
.phasecard.on{box-shadow:0 0 0 2px currentColor inset}
.phasecard .pt{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:7px}
.phasecard .pn{font-family:var(--serif);font-size:18px;font-weight:600}
.phasecard .pd{font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}
.phasecard .pb{font-size:12.5px;line-height:1.5;color:var(--inkMid)}
.phasecard .plst{display:grid;gap:4px;margin-top:8px;font-size:12px;line-height:1.42}
.phasecompact{border-radius:18px;border:1px solid var(--line);padding:14px;background:#fff}
.phasecompact .pn{font-family:var(--serif);font-size:20px;font-weight:600;margin-top:3px}
.phasecompact .pb{font-size:12.5px;line-height:1.5;color:var(--inkMid);margin-top:6px}
.phasecompact .minirow{margin-top:10px}
.phasepill{border-radius:999px;padding:7px 10px;font-size:11px;font-weight:800;background:#fff;color:var(--inkMid);border:1px solid rgba(33,28,26,.07)}
.foodhero{background:linear-gradient(135deg,#FBEFCB 0%,#FBE4E9 86%);border-color:#F2D7B5}
.foodchips,.trainchips{display:flex;flex-wrap:wrap;gap:7px;margin:11px 0 4px}
.nutrichip{border-radius:999px;padding:7px 10px;font-size:11px;font-weight:800;background:#fff;color:var(--inkMid);border:1px solid rgba(33,28,26,.07)}
.mealcard{display:grid;grid-template-columns:38px 1fr;gap:11px;align-items:start;padding:12px 0;border-top:1px solid var(--line)}
.mealico{width:38px;height:38px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:19px;background:var(--paper2)}
.mealmain{min-width:0}.mealtop{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.swapbtn{border:1px solid var(--line);background:#fff;color:var(--roseDeep);border-radius:999px;padding:6px 10px;font-family:var(--sans);font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap}
.swapbtn:active{transform:scale(.96)}
.mealwhy{font-size:11px;line-height:1.45;color:var(--inkMid);margin-top:4px}
.trainrow{display:grid;grid-template-columns:1fr;gap:7px;padding:12px 0;border-top:1px solid var(--line)}
.trainrow .tn{font-weight:800;font-size:13.5px}.trainrow .tb{font-size:12px;color:var(--ink);line-height:1.45}.trainrow .th{font-size:11.5px;color:var(--inkSoft);line-height:1.45}
.trainrow.rich{grid-template-columns:38px 1fr;gap:11px;align-items:start}
.trainico{width:38px;height:38px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:var(--inkMid);background:var(--sageWash)}
.trainhead{display:grid;grid-template-columns:1fr;gap:4px;background:var(--paper2);border-radius:14px;padding:10px 12px;color:var(--inkSoft);font-size:10px;text-transform:uppercase;font-weight:800;letter-spacing:.04em}
.trainmeta{display:grid;gap:6px;margin-top:6px}
.trainmeta .ml{font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--inkSoft);font-weight:900}
.trainmeta .mv{font-size:11.7px;line-height:1.42;color:var(--inkMid)}
.sciencegrid{display:grid;gap:8px;margin-top:10px}
.sciencerow{display:grid;grid-template-columns:28px 1fr;gap:9px;align-items:start;border-top:1px solid var(--line);padding-top:8px}
.sciencerow:first-child{border-top:none;padding-top:0}
.sciencen{width:28px;height:28px;border-radius:10px;background:var(--roseWash);color:var(--roseDeep);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900}
.sciencet{font-size:12.5px;line-height:1.48;color:var(--inkMid)}
.profileform{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.profileform label{display:grid;gap:5px;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--inkSoft);font-weight:800}
.profileform input{width:100%;box-sizing:border-box;border:1px solid var(--line);border-radius:13px;background:#fff;padding:10px 9px;font-family:var(--sans);font-size:13px;color:var(--ink)}
.profileactions{display:flex;gap:8px;margin-top:10px}
.delaycard{border-color:#DDD4CE;background:#F2EEEB}
.delaycard .sec{color:#6E635C}
.emptygraph{min-height:132px;border-radius:16px;background:linear-gradient(180deg,#fff 0%,#F4ECE7 100%);display:flex;align-items:center;justify-content:center;text-align:center;color:var(--inkSoft);font-size:12px;line-height:1.5;padding:18px}
.homebtn{display:block;width:100%;margin:18px 0 2px;padding:13px;border:1px solid var(--roseLine);background:var(--roseWash);color:var(--roseDeep);border-radius:16px;font-family:var(--sans);font-weight:600;font-size:13.5px;cursor:pointer}
.homebtn:active{transform:scale(.98)}
.partnerbox{border-radius:16px;border:1px solid var(--line);background:#fff;padding:12px;margin-top:10px;word-break:break-word}
.partnerbox .ln{font-size:12.5px;line-height:1.5;color:var(--inkMid)}
.copylink{width:100%;margin-top:10px;border:none;border-radius:14px;background:var(--roseDeep);color:#fff;padding:11px 12px;font-family:var(--sans);font-weight:800;cursor:pointer}
.copylink.danger{background:#EFEAE6;color:#6E635C;border:1px solid var(--line)}
.copylink:active{transform:scale(.98)}
.think{display:inline-flex;gap:4px;align-items:center;color:var(--roseDeep);font-size:13px;font-style:italic}
.think span{width:4px;height:4px;border-radius:50%;background:var(--rose);animation:dp 1s infinite}
.think span:nth-child(2){animation-delay:.16s}.think span:nth-child(3){animation-delay:.32s}
@keyframes dp{0%,100%{opacity:.3}50%{opacity:1}}
.hidden{display:none}
</style>
</head>
<body>
<div id="app">
  <div class="bar"><div class="brand"><span class="blossom" id="logo"></span><span class="nm">Айва</span></div><div class="date" id="date"></div></div>
  <div id="scr-today"></div>
  <div id="scr-food" class="hidden"></div>
  <div id="scr-train" class="hidden"></div>
  <div id="scr-chat" class="hidden"><div class="h">Айва</div><div class="chatwrap" id="chatlog"></div></div>
  <div id="scr-stats" class="hidden"></div>
</div>
<div class="composer hidden" id="composer"><input id="cin" placeholder="Спроси Айву…"><button id="csend">→</button></div>
<div class="tabs" id="tabs"></div>
<div id="toast" class="toast hidden"></div>
<script>
const tg=window.Telegram&&window.Telegram.WebApp; if(tg){tg.ready();tg.expand();}
function haptic(type,style){if(tg&&tg.HapticFeedback&&(!tg.isVersionAtLeast||tg.isVersionAtLeast("6.1"))){try{if(type==="selection")tg.HapticFeedback.selectionChanged();else tg.HapticFeedback.impactOccurred(style||"light");}catch(e){}}}
const INIT=(tg&&tg.initData)||"";
const NAME=(tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user&&tg.initDataUnsafe.user.first_name)||"";
const MONTHS=["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
const MNOM=["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
const WD=["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
const COL={men:"#C25E76",fol:"#54A86B",ovu:"#2E7FE0",lut:"#B36BC9"};
const WASH={men:"#FBE4E9",fol:"#E3F1E7",ovu:"#DCEAFB",lut:"#F1E3F7"};
const RU={men:"Менструальная",fol:"Фолликулярная",ovu:"Овуляторная",lut:"Лютеиновая"};
const SUMM={men:"Идут месячные, эстроген и прогестерон на минимуме. Энергии меньше, это норма, телу нужны отдых, тепло и железо.",
fol:"Эстроген растёт, энергия и настроение идут вверх. Хорошее окно для нагрузок и сложных задач.",
ovu:"Пик эстрогена, максимум энергии и либидо. Короткое, но самое активное окно цикла.",
lut:"Растёт прогестерон, ближе к месячным возможны ПМС, тяга к сладкому и усталость. Помогают магний, B6 и спокойный режим."};
const PHASE_GUIDE={
men:{days:"обычно 1-5 день",body:"Эстроген и прогестерон низкие, матка отторгает эндометрий. Могут быть спазмы, слабость, сонливость, тянущая боль в пояснице.",food:"Белок, железо и тёплая еда: яйца, говядина, печень, гречка, рыба, зелень.",move:"Мягко: ходьба, растяжка, йога. Если больно или обильно, отдых нормален."},
fol:{days:"после месячных",body:"Эстроген растёт, фолликул созревает. Часто легче думать, двигаться, учиться новому и возвращаться к активному режиму.",food:"Белок в каждый приём, сложные углеводы и клетчатка: яйца, курица, рыба, рис, гречка, овощи.",move:"Хорошее окно для силовых, пилатеса и бодрого кардио."},
ovu:{days:"примерно середина цикла",body:"Пик эстрогена и ЛГ, фертильное окно. Может быть больше энергии, либидо, прозрачные выделения, лёгкая тянущая боль сбоку.",food:"Белок, омега-3, овощи и вода: рыба, индейка, яйца, зелень, ягоды.",move:"Можно интенсивнее, но с разминкой: связки могут ощущаться мягче."},
lut:{days:"после овуляции",body:"Прогестерон растёт, тело готовится к месячным. Возможны ПМС, отёки, грудь чувствительнее, тяга к сладкому и усталость.",food:"Белок, магний, B6 и стабильные углеводы: рыба, индейка, яйца, картофель, гречка, орехи.",move:"Умеренно: силовая легче обычного, ходьба, плавание, пилатес, растяжка."}
};
const PHASE_FOCUS={
men:{food:"железо + тёплая еда",move:"мягко, без боли"},

    "<text x='4' y='"+Y(35).toFixed(1)+"' font-size='9' fill='#A89C93'>35</text><text x='4' y='"+Y(28).toFixed(1)+"' font-size='9' fill='#A89C93'>28</text><text x='4' y='"+Y(21).toFixed(1)+"' font-size='9' fill='#A89C93'>21</text>"+
    "<path d='"+path+"' fill='none' stroke='#C4BAB3' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/>"+dots+"</svg>";
}
async function loadPartner(){
  var box=document.getElementById("partnerOut");if(!box)return;
  box.innerHTML="<div class='ln'>Готовлю ссылку<span class='think'><span></span><span></span><span></span></span></div>";
  var r=await api("/api/partner",{});
  if(!(r&&r.link)){box.innerHTML="<div class='ln'>Ссылка будет доступна после запуска приложения из Telegram. В боте можно открыть командой /partner.</div>";return;}
  var status=r.linked?"Партнёр уже подключён. Он получает апдейты в Telegram. Доступ можно отключить в любой момент.":"Партнёр пока не подключён. Перешли ему ссылку, он откроет бота и подтвердит подключение.";
  box.innerHTML="<div class='ayva-lab'>Ссылка для партнёра</div><div class='ln'>"+status+"</div><div class='partnerbox'><div class='ln' id='plink'>"+esc(r.link)+"</div><button class='copylink' onclick='copyPartnerLink()'>Скопировать ссылку</button>"+(r.linked?"<button class='copylink danger' onclick='unlinkPartner()'>Отключить партнёра</button>":"")+"</div>";
}
async function unlinkPartner(){
  var r=await api("/api/partner",{action:"unlink"});
  if(r&&r.ok){toast("Партнёр отключён");loadPartner();}
  else toast("Не получилось отключить");
}
function copyPartnerLink(){
  var t=document.getElementById("plink");if(!t)return;
  var s=t.textContent||"";
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(s).then(function(){toast("Ссылка скопирована");}).catch(function(){toast("Ссылка готова");});}
  else{toast("Ссылка готова");}
}
function showProfileEditor(){var el=document.getElementById("profileEditor");if(el)el.classList.toggle("hidden");}
async function saveProfileApp(){
  var h=parseFloat(String(document.getElementById("profHeight").value||"").replace(",","."));
  var w=parseFloat(String(document.getElementById("profWeight").value||"").replace(",","."));
  var a=parseInt(String(document.getElementById("profAge").value||""),10);
  if(!(h>120&&h<220&&w>30&&w<250&&a>10&&a<80)){toast("Проверь рост, вес и возраст");return;}
  var r=await api("/api/profile",{height:h,weight:w,age:a});
  if(r&&r.ok){D.profile=r.profile;loadedFood=false;toast("Данные обновлены");renderStats();}
  else toast("Не получилось сохранить");
}
function renderStats(){
  var el=document.getElementById('scr-stats');var s=(D&&D.stats)||{},p=(D&&D.profile)||{};
  var html="<div class='h'>Статистика</div>";
  html+="<div class='stats'>";
  html+="<div class='stat'><div class='l'>Прошлый цикл</div><div class='v'>"+(s.last_cycle_len||'нет')+"</div><div class='s'>дней</div></div>";
  html+="<div class='stat'><div class='l'>Средний цикл</div><div class='v'>"+(s.avg_cycle||'нет')+"</div><div class='s'>дней</div></div>";
  html+="<div class='stat'><div class='l'>Месячные</div><div class='v'>"+(s.period_len||'нет')+"</div><div class='s'>дней</div></div>";
  html+="</div>";
  var graph=cycleChart(s.history||[]);
  html+="<div class='card'><div class='sec' style='margin-top:0'>Динамика цикла</div>";
  html+=graph||"<div class='emptygraph'>Добавь ещё один завершённый цикл, и здесь появится линия динамики по дням.</div>";
  html+="<div class='nt' style='margin-top:8px;color:var(--inkSoft)'>Серая зона: 21-35 дней. Числа на точках показывают длину цикла.</div></div>";
  var hist=(s.history||[]).slice().reverse();
  html+="<div class='card'><div class='sec' style='margin-top:0'>История циклов</div>";
  if(hist.length){
    hist.forEach(function(h){
      var main="с "+fmtD(h.start)+(h.end?(" по "+fmtD(h.end)):"");
      var meta=h.len?("цикл "+h.len+" дней"):"текущий цикл";
      if(h.period_len)meta+=", месячные "+h.period_len+" дн";
      html+="<div class='mealcard'><div class='mealico' style='background:#FBE4E9'>🩸</div><div><div class='ds'>"+main+"</div><div class='mealwhy'>"+meta+"</div></div></div>";
    });
  } else {
    html+="<div class='emptygraph'>Пока нет сохранённых циклов. Отметь месячные на календаре или добавь прошлые циклы вручную в боте.</div>";
  }
  html+="</div>";
  html+="<div class='card'><div class='sec' style='margin-top:0'>Мои данные</div><div class='kv'>";
  html+="<div class='stat'><div class='l'>Цикл</div><div class='v'>"+(D.cycle_len||'нет')+"</div><div class='s'>дней</div></div>";
  html+="<div class='stat'><div class='l'>Сводка</div><div class='v' style='font-size:18px'>"+(D.send_time||"08:00")+"</div><div class='s'>МСК</div></div>";
  html+="<div class='stat'><div class='l'>Рост</div><div class='v'>"+(p.height||'нет')+"</div><div class='s'>см</div></div>";
  html+="<div class='stat'><div class='l'>Вес</div><div class='v'>"+(p.weight||'нет')+"</div><div class='s'>кг</div></div>";
  html+="</div><div class='chips'><button class='chip' onclick='showProfileEditor()'>Изменить рост и вес</button><button class='chip' onclick='go(\"chat\");setTimeout(function(){send(\"Как поменять время рассылки?\");},120)'>Время сводки</button><button class='chip' onclick='go(\"chat\");setTimeout(function(){send(\"Как добавить историю циклов?\");},120)'>История циклов</button></div>";
  html+="<div id='profileEditor' class='hidden'><div class='profileform'><label>Рост<input id='profHeight' inputmode='decimal' value='"+esc(p.height||"")+"' placeholder='168'></label><label>Вес<input id='profWeight' inputmode='decimal' value='"+esc(p.weight||"")+"' placeholder='60'></label><label>Возраст<input id='profAge' inputmode='numeric' value='"+esc(p.age||"")+"' placeholder='30'></label></div><div class='profileactions'><button class='pbtn' onclick='saveProfileApp()'>Сохранить</button><button class='pbtn alt' onclick='showProfileEditor()'>Отмена</button></div></div></div>";
  html+="<div class='card'><div class='sec' style='margin-top:0'>Партнёр</div><div class='ayva-txt'>Партнёр будет видеть не твой календарь, а короткую сводку в Telegram: день цикла, общее состояние и несколько подсказок, как поддержать. Доступ можно отключить в любой момент.</div><button class='copylink' onclick='loadPartner()'>Получить ссылку</button><div id='partnerOut'></div></div>";
  if(s.regularity){html+="<div class='card'><div class='pl'><span class='tag' style='color:var(--roseDeep);background:var(--roseWash)'>"+s.regularity+"</span></div>"+(s.spread!=null?("<div class='pmeta'>разброс длины цикла "+s.min_cycle+"-"+s.max_cycle+" дней</div>"):"")+"</div>";}
  html+="<div class='foot'>Статистика строится по твоим отметкам: циклы, симптомы и история изменений.</div>";
  el.innerHTML=html;
}
var chatInited=false;
function bubbleAI(text){var d=document.createElement('div');d.className='msg ai';d.textContent=text;document.getElementById('chatlog').appendChild(d);return d;}
function bubbleMe(text){var d=document.createElement('div');d.className='msg me';d.textContent=text;document.getElementById('chatlog').appendChild(d);}
function scrollBottom(){window.scrollTo(0,document.body.scrollHeight);}
async function send(text){text=(text||document.getElementById('cin').value).trim();if(!text)return;document.getElementById('cin').value='';bubbleMe(text);var t=bubbleAI('');t.innerHTML="<span class='think'>Айва думает<span></span><span></span><span></span></span>";scrollBottom();var r=await api('/api/chat',{message:text});t.textContent=r.answer||"Не получилось ответить, попробуй ещё раз.";if(r.suggestions&&r.suggestions.length){var c=document.createElement('div');c.className='chips';r.suggestions.forEach(function(s){var b=document.createElement('button');b.className='chip';b.textContent=s;b.onclick=function(){send(s);};c.appendChild(b);});t.appendChild(c);}scrollBottom();}
function initChat(){
  if(chatInited)return;chatInited=true;var log=(D&&D.chatlog)||[];
  if(log.length){log.forEach(function(m){if(m.role==="user")bubbleMe(m.text);else bubbleAI(m.text);});scrollBottom();}
  else{
    var b=bubbleAI("Привет! Спроси меня о цикле, питании, тренировках или самочувствии. Я отвечу с учётом твоей фазы, данных и медицинских рекомендаций.");
    var c=document.createElement("div");c.className="chips";
    ["Когда овуляция?","Что есть сегодня?","Можно тренироваться?"].forEach(function(s){var x=document.createElement("button");x.className="chip";x.textContent=s;x.onclick=function(){send(s);};c.appendChild(x);});
    b.appendChild(c);
  }
}
document.getElementById('csend').onclick=function(){send();};
document.getElementById('cin').addEventListener('keydown',function(e){if(e.key==='Enter')send();});
document.getElementById('cin').addEventListener('focus',function(){setTimeout(scrollBottom,300);});
var ICONS={
today:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2.2M12 19.3v2.2M4.6 4.6l1.6 1.6M17.8 17.8l1.6 1.6M2.5 12h2.2M19.3 12h2.2M4.6 19.4l1.6-1.6M17.8 6.2l1.6-1.6"/></svg>',
food:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19c8 1 14-4 14-13C10 6 4 11 5 19z"/><path d="M6 18c2-5 5-7 9-8.5"/></svg>',
train:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l2.5-6 5 13 2.5-7H21"/></svg>',
chat:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20.5 11.5a8 7 0 0 1-11.6 6.3L4 19l1.2-4.2A7.5 7 0 1 1 20.5 11.5z"/></svg>',
stats:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M5 20V12M12 20V5M19 20v-9M3 20h18"/></svg>'};
var TABS=[["today","Сегодня"],["food","Питание"],["train","Нагрузка"],["stats","Статистика"],["chat","Айва"]];
function go(t){TABS.forEach(function(x){document.getElementById('scr-'+x[0]).classList.toggle('hidden',x[0]!==t);document.querySelector('.tab[data-t="'+x[0]+'"]').classList.toggle('on',x[0]===t);});document.getElementById('composer').classList.toggle('hidden',t!=='chat');if(t==='food')renderFood();if(t==='train')renderTrain();if(t==='stats')renderStats();if(t==='chat'){initChat();scrollBottom();}window.scrollTo(0,0);}
var tabsEl=document.getElementById('tabs');
TABS.forEach(function(x){var d=document.createElement('div');d.className='tab';d.setAttribute('data-t',x[0]);d.innerHTML=ICONS[x[0]]+"<span>"+x[1]+"</span>";d.onclick=function(){if(!d.classList.contains("on")){haptic("selection");haptic("impact","light");}go(x[0]);};tabsEl.appendChild(d);});
function showNeedOnboard(){
  document.getElementById('tabs').style.display='none';
  document.getElementById('composer').classList.add('hidden');
  var el=document.getElementById('app');
  el.innerHTML="<div style='display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:78vh;text-align:center;gap:18px;padding:24px'><span class='blossom' id='nl'></span><div class='h' style='margin:0'>Сначала настрой Айву</div><div style='font-size:14px;color:var(--inkMid);line-height:1.5;max-width:300px'>Открой чат и ответь на пару вопросов. После этого приложение покажет персональные рекомендации по циклу, питанию, нагрузке и самочувствию.</div><button class='chip' style='font-size:14px;padding:11px 22px' onclick='if(window.Telegram&&window.Telegram.WebApp)window.Telegram.WebApp.close()'>Перейти в чат</button></div>";
  blossom(document.getElementById('nl'),56);
}
function addHome(){haptic("impact","light");if(tg&&tg.addToHomeScreen){tg.addToHomeScreen();}else if(tg&&tg.showAlert){tg.showAlert('Доступно в новых версиях Telegram: меню \u22EE \u2192 «На главный экран».');}}
function updateHomeBtn(){var b=document.getElementById('homebtn');if(!b)return;if(!(tg&&tg.isVersionAtLeast&&tg.isVersionAtLeast('8.0'))){b.style.display='none';return;}if(tg.checkHomeScreenStatus){tg.checkHomeScreenStatus(function(st){b.style.display=(st==='added'||st==='unsupported')?'none':'block';});}else{b.style.display='block';}}
function boot(){renderToday();go('today');}
if(INIT){api('/api/data',{name:NAME}).then(function(d){if(d&&d.onboarded){D=d;boot();}else{showNeedOnboard();}});}
else{D={onboarded:true,cycle:true,last_period:null,cycle_len:28,name:NAME};boot();}
</script>
